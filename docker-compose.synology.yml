# ─────────────────────────────────────────────────────────────────────────────
# TectumFW Standalone — Synology Container Manager / pull-only deploy
#
# Pulls prebuilt amd64 images from GHCR (published by
# .github/workflows/publish-images.yml). NO build context, NO bind mounts, NO
# Ollama — paste straight into a Container Manager Project on a DS-series NAS.
#
#   1. cp .env.standalone.example .env   (set OLLAMA_HOST to your Ollama box,
#                                          e.g. http://192.168.1.232:11434)
#   2. docker compose -f docker-compose.synology.yml up -d
#
# The DB self-initializes: the API applies its idempotent schema on startup, so
# no schema.sql mount is needed. Host ports are env-driven — map whatever you
# like (left side); internal ports are fixed.
# ─────────────────────────────────────────────────────────────────────────────

services:
  cloven_tectum_db:
    image: pgvector/pgvector:pg17
    container_name: cloven_tectum_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASS}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "${DATABASE_HOST_PORT:-55432}:5432"
    volumes:
      - cloven_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  cloven_tectum_api:
    image: ghcr.io/cycotek/tectum-api:${IMAGE_TAG:-latest}
    container_name: cloven_tectum_api
    restart: unless-stopped
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      cloven_tectum_db:
        condition: service_healthy
    ports:
      - "${API_PORT:-8800}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\""]
      interval: 30s
      timeout: 10s
      retries: 5

  cloven_tectum_fetcher:
    image: ghcr.io/cycotek/tectum-fetcher:${IMAGE_TAG:-latest}
    container_name: cloven_tectum_fetcher
    restart: unless-stopped
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      cloven_tectum_db:
        condition: service_healthy
    ports:
      - "${FETCHER_PORT:-8801}:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=3)\""]
      interval: 30s
      timeout: 10s
      retries: 5

  cloven_tectum_mcp:
    image: ghcr.io/cycotek/tectum-mcp:${IMAGE_TAG:-latest}
    container_name: cloven_tectum_mcp
    restart: unless-stopped
    environment:
      TECTUM_API_HOST: "http://cloven_tectum_api:8000"
      TECTUM_FETCHER_HOST: "http://cloven_tectum_fetcher:8001"
      MCP_PORT: "8802"
    depends_on:
      cloven_tectum_api:
        condition: service_started
      cloven_tectum_fetcher:
        condition: service_started
    ports:
      - "${MCP_PORT:-8802}:8802"

volumes:
  cloven_db_data:
