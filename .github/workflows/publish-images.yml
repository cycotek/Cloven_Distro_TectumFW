name: Publish container images

# Builds the three TectumFW Standalone service images and pushes them to the
# GitHub Container Registry (GHCR), tagged amd64 for Synology DS-series (x86-64)
# and any other Docker host. Pull-only deploys (Container Manager) then reference
# these via docker-compose.synology.yml — no build context needed on the NAS.

on:
  push:
    branches: [main, standalone-mcp]
    tags: ["v*"]
    # Docs-only changes don't change image contents — skip the rebuild.
    paths-ignore:
      - '**.md'
      - 'assets/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: tectum-api
            context: ./tectum_framework/api_server
          - name: tectum-fetcher
            context: ./tectum_framework/fetcher
          - name: tectum-mcp
            context: ./tectum_framework/mcp_server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
