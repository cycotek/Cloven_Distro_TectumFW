services:
  ollama:
    image: ollama/ollama:latest
    container_name: cloven_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      # Allow multiple models to stay resident in VRAM simultaneously.
      # VRAM budget: llama3.2:3b ~2GB | qwen2.5:7b ~5GB | mistral-nemo:12b ~8GB
      #              deepseek-r1:14b ~10GB  →  all four ~25GB total
      # Lower MAX_LOADED_MODELS if you run out of VRAM (models will swap to CPU).
      - OLLAMA_NUM_PARALLEL=3
      - OLLAMA_MAX_LOADED_MODELS=4
      - OLLAMA_KEEP_ALIVE=30m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  cloven_tectum_db:
    image: pgvector/pgvector:pg17
    container_name: cloven_tectum_db
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASS}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "${DATABASE_PORT}:5432"
    volumes:
      - cloven_db_data:/var/lib/postgresql/data
      - ./tectum_framework/api_server/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  cloven_tectum_api:
    build: ./tectum_framework/api_server
    container_name: cloven_tectum_api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      cloven_tectum_db:
        condition: service_healthy
      ollama:
        condition: service_started
    ports:
      - "${API_PORT}:8000"
    volumes:
      # Mount static files so HTML/CSS/JS changes take effect without rebuild
      - ./tectum_framework/api_server/static:/app/static:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  cloven_tectum_fetcher:
    build: ./tectum_framework/fetcher
    container_name: cloven_tectum_fetcher
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      cloven_tectum_db:
        condition: service_healthy
      ollama:
        condition: service_started
    ports:
      - "${FETCHER_PORT:-8001}:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  ollama_data:
  cloven_db_data:
