services:
  cloven_tectum_db:
    image: pgvector/pgvector:pg17
    container_name: cloven_tectum_db
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASS}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "${DATABASE_PORT}:5432"
    volumes:
      - cloven_db_data:/var/lib/postgresql/data
      - ./tectum_framework/api_server/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  cloven_tectum_api:
    build: ./tectum_framework/api_server
    container_name: cloven_tectum_api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      cloven_tectum_db:
        condition: service_healthy
    ports:
      - "${API_PORT}:8000"
    volumes:
      - ./tectum_framework/api_server:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  cloven_db_data:
